
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Name Formatter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f4; color: #1c1c1a; min-height: 100vh; padding: 2rem 1rem;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #5f5e5a; margin-bottom: 1.5rem; }
    .card {
      background: #fff; border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem;
    }
    label { font-size: 12px; color: #5f5e5a; display: block; margin-bottom: 4px; }
    input {
      width: 100%; padding: 8px 12px; border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px; font-size: 14px; font-family: inherit;
      background: #fff; color: #1c1c1a; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(0,0,0,0.4); }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    button {
      padding: 8px 16px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px;
      background: transparent; font-size: 13px; font-family: inherit;
      cursor: pointer; color: #1c1c1a; white-space: nowrap; transition: background 0.1s;
    }
    button:hover { background: #f1efe8; }
    button:active { transform: scale(0.98); }
    button.primary { background: #1c1c1a; color: #fff; border-color: #1c1c1a; }
    button.primary:hover { background: #3a3a38; }
    .results { display: flex; flex-direction: column; gap: 10px; }
    .result-item {
      background: #fff; border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 10px; padding: 12px 14px;
    }
    .result-label {
      font-size: 11px; color: #5f5e5a; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .result-value {
      font-size: 15px; font-weight: 500; color: #1c1c1a;
      font-family: "SF Mono", "Fira Code", monospace;
      word-break: break-all;
    }
    .copy-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .copy-btn {
      padding: 3px 10px; font-size: 11px; border-radius: 6px;
      border: 0.5px solid rgba(0,0,0,0.2); background: transparent;
      cursor: pointer; color: #5f5e5a; white-space: nowrap; flex-shrink: 0;
    }
    .copy-btn:hover { background: #f1efe8; }
    .copy-btn.copied { color: #27500a; border-color: #3b6d11; }
    .alert-error {
      background: #fcebeb; border: 0.5px solid #f09595; color: #791f1f;
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      body    { background: #18181a; color: #e8e6e0; }
      .card, .result-item { background: #222224; border-color: rgba(255,255,255,0.1); }
      input   { background: #2a2a2c; border-color: rgba(255,255,255,0.15); color: #e8e6e0; }
      input:focus { border-color: rgba(255,255,255,0.35); }
      button  { color: #e8e6e0; border-color: rgba(255,255,255,0.2); }
      button:hover, .copy-btn:hover { background: #2a2a2c; }
      button.primary { background: #e8e6e0; color: #18181a; border-color: #e8e6e0; }
      .result-value { color: #e8e6e0; }
      .result-label, .subtitle, label { color: #9e9d99; }
      .copy-btn { color: #9e9d99; border-color: rgba(255,255,255,0.15); }
      .alert-error { background: #2d1a1a; border-color: #a32d2d; color: #f09595; }
    }
  </style>
</head>
<body>
<div class="container">

  <h1>Company Name Formatter</h1>
  <p class="subtitle">Enter a company name to generate slug and ACL Desktop Review label</p>

  <div class="card">
    <label for="companyInput">Company name</label>
    <input
      id="companyInput"
      type="text"
      placeholder="e.g. SOLIDAIRE LENDING PTY LTD"
      oninput="format()"
    />
    <div class="row">
      <button class="primary" onclick="format()">Format</button>
      <button onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div id="error" style="display:none" class="alert-error"></div>
  <div class="results" id="results"></div>

</div>
<script>
  // Suffixes to strip for slug generation
  const SUFFIXES = [
    "PTY LTD", "PTY. LTD.", "PTY LTD.", "PTY. LTD",
    "PTY", "LTD", "LTD.", "LIMITED",
    "INC", "INC.", "INCORPORATED",
    "PLC", "LLC", "CO.", "CO",
    "& CO", "AND CO",
  ];

  function toTitleCase(str) {
    const minors = new Set(["and","or","of","the","a","an","in","on","at","to","for","&"]);
    return str.toLowerCase().split(" ").map((w, i) => {
      if (!w) return w;
      if (i !== 0 && minors.has(w)) return w;
      return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(" ");
  }

  function stripSuffixes(upper) {
    let result = upper.trim();
    let changed = true;
    while (changed) {
      changed = false;
      for (const suffix of SUFFIXES) {
        if (result.endsWith(" " + suffix)) {
          result = result.slice(0, result.length - suffix.length - 1).trim();
          changed = true;
        }
      }
    }
    return result;
  }

  function generateSlug(name) {
    const upper   = name.trim().toUpperCase();
    const stripped = stripSuffixes(upper);
    const words   = stripped.split(/\s+/).filter(Boolean);
    // Take first two meaningful words
    const slugWords = words.slice(0, 2);
    return slugWords.map(w => w.charAt(0) + w.slice(1).toLowerCase()).join("_");
  }

  function generateACL(name) {
    const upper    = name.trim().toUpperCase();
    const titleCased = toTitleCase(upper);
    return `ACL Desktop Review | ${titleCased}`;
  }

  function generateBSS(name) {
    const upper    = name.trim().toUpperCase();
    const titleCased = toTitleCase(upper);
    return `BSS Broker Document Portal | | ${titleCased}`;
  }

  function format() {
    const raw     = document.getElementById("companyInput").value.trim();
    const errBox  = document.getElementById("error");
    const results = document.getElementById("results");

    if (!raw) {
      errBox.style.display = "none";
      results.innerHTML = "";
      return;
    }

    errBox.style.display = "none";

    const slug = generateSlug(raw);
    const acl  = generateACL(raw);
    const bss  = generateBSS(raw);

    results.innerHTML = `
      <div class="result-item">
        <div class="result-label">Slug / filename</div>
        <div class="copy-row">
          <div class="result-value" id="val-slug">${slug}</div>
          <button class="copy-btn" onclick="copyVal('val-slug', this)">Copy</button>
        </div>
      </div>
      <div class="result-item">
        <div class="result-label">ACL Desktop Review label</div>
        <div class="copy-row">
          <div class="result-value" id="val-acl">${acl}</div>
          <button class="copy-btn" onclick="copyVal('val-acl', this)">Copy</button>
        </div>
      </div>
      <div class="result-item">
        <div class="result-label">BSS Broker Document Portal label</div>
        <div class="copy-row">
          <div class="result-value" id="val-bss">${bss}</div>
          <button class="copy-btn" onclick="copyVal('val-bss', this)">Copy</button>
        </div>
      </div>
    `;
  }

  function copyVal(id, btn) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "Copied!";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1500);
    });
  }

  function clearAll() {
    document.getElementById("companyInput").value = "";
    document.getElementById("results").innerHTML = "";
    document.getElementById("error").style.display = "none";
  }

  // Allow Enter key to trigger format
  document.getElementById("companyInput").addEventListener("keydown", e => {
    if (e.key === "Enter") format();
  });
</script>
</body>
</html>
